services:
  postgres:
    image: postgres:16-alpine
    container_name: oxu-kids-postgres
    environment:
      POSTGRES_DB: oxu_kids
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - oxu-kids-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oxu_kids"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  oxu-kids-postgres-data:
