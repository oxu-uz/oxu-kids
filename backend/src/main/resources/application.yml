server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/oxu_kids}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  jackson:
    time-zone: Asia/Tashkent

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
  security:
    jwt-secret: ${JWT_SECRET:b3h1LWtpZHMtZGV2LXNlY3JldC1rZXktZm9yLWxvY2FsLXVzZS1vbmx5LTIwMjYtYXBw}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:5173}
      - http://127.0.0.1:5173
      - http://localhost:5174
      - http://127.0.0.1:5174
    super-admin-email: ${SUPER_ADMIN_EMAIL:superadmin@oxukids.uz}
    super-admin-password: ${SUPER_ADMIN_PASSWORD:SuperAdmin123!}
    super-admin-name: ${SUPER_ADMIN_NAME:OXU KIDS Super Admin}
    admin-email: ${ADMIN_EMAIL:admin@oxukids.uz}
    admin-password: ${ADMIN_PASSWORD:Admin123!}
    admin-name: ${ADMIN_NAME:OXU KIDS Admin}
